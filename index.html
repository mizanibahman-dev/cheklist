<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
     <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>چک لیست من</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>

            <h1>چک لیست من</h1>

            <div class="main-tabs">

                <button class="main-tab active" data-main="tasks">
                    📋 کارها
                </button>

                <button class="main-tab" data-main="shopping">
                    🛒 خرید
                </button>

            </div>

        </header>

        <!-- زیرسربرگ کارها -->

        <div id="tasksTabs" class="sub-tabs">

            <button class="sub-tab active" data-section="allTasks">
                کل کارها
            </button>

            <button class="sub-tab" data-section="currentTasks">
                کارهای جاری
            </button>

            <button class="sub-tab" data-section="todayTasks">
                کارهای امروز
            </button>

        </div>

        <!-- زیرسربرگ خرید -->

        <div id="shoppingTabs" class="sub-tabs hidden">

            <button class="sub-tab active" data-section="dailyShopping">
                خرید روز
            </button>

            <button class="sub-tab" data-section="otherShopping">
                سایر
            </button>

        </div>


        <!-- افزودن آیتم -->

        <div class="add-box">

            <input
                type="text"
                id="newItem"
                placeholder="مورد جدید را وارد کنید...">

            <button id="addBtn">
                افزودن
            </button>

        </div>


        <!-- دکمه حذف انجام شده ها -->

        <div class="toolbar">

            <button id="deleteCompleted">

                حذف انجام شده‌ها

            </button>

        </div>


        <!-- لیست -->

        <div id="listContainer">

        </div>

    </div>


    <!-- قالب هر آیتم -->

    <template id="itemTemplate">

        <div class="item">

            <button class="move-left">
                ◀
            </button>

                       <input
                type="checkbox"
                class="done">

            <span class="text">

            </span>

            <button class="move-menu">⇅</button>

            <button class="move-right">
                ▶
            </button>

        </div>

    </template>


    <script src="storage.js"></script>

    <script src="app.js"></script>

</body>

</html>
